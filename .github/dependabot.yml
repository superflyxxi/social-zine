version: 2

updates:
  - package-ecosystem: "npm"
    target-branch: "main"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci(deps): "
      prefix-development: "ci(dev-deps): "
  - package-ecosystem: "npm"
    target-branch: "main"
    directory: "/zine-generator"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "fix(zine-generator): "
      prefix-development: "chore(zine-generator): "
  - package-ecosystem: "docker"
    target-branch: "main"
    directory: "/zine-generator"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "fix(zine-generator): "
  - package-ecosystem: "npm"
    target-branch: "main"
    directory: "/common"
